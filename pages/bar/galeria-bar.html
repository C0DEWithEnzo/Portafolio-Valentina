<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retratos de Bar | Valentina Ferreyra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="../../sources/hero/page-icon.webp">
</head>
<body>
  <div class="pg">
    <div class="blur-a"></div>
    <div class="blur-b"></div>

    <a class="btn-back" href="../../index.html">← &nbsp;Inicio</a>

    <div class="content">
      <header class="hero">
        <p class="hero-tag">Valentina Ferreyra</p>
        <h1 class="hero-title">Retratos<br><em>de un Bar</em></h1>
        <div class="hero-deco">
          <div class="hero-rule"></div>
        </div>
      </header>

      <section class="grid">

        <!-- BLOQUE 1 — panorámica arriba / [2 apiladas + 1 grande] abajo -->
        <div class="block-a">
          <div class="cell cell-wide">
            <img src="sources/frame1.webp" alt="Foto 01"><div class="cell-num">01</div>
          </div>
          <div class="block-a-bottom">
            <div class="block-a-stack">
              <div class="cell"><img src="sources/frame2.webp" alt="Foto 02"><div class="cell-num">02</div></div>
              <div class="cell"><img src="sources/frame3.webp" alt="Foto 03"><div class="cell-num">03</div></div>
            </div>
            <div class="cell"><img src="sources/frame4.webp" alt="Foto 04"><div class="cell-num">04</div></div>
          </div>
        </div>

        <!-- BLOQUE 2 — 2 iguales arriba / panorámica abajo -->
        <div class="block-b">
          <div class="block-b-top">
            <div class="cell"><img src="sources/frame5.webp" alt="Foto 05"><div class="cell-num">05</div></div>
            <div class="cell"><img src="sources/frame6.webp" alt="Foto 06"><div class="cell-num">06</div></div>
          </div>
          <div class="cell cell-wide">
            <img src="sources/frame8.webp" alt="Foto 07"><div class="cell-num">07</div>
          </div>
        </div>

        <!-- BLOQUE 3 — 2 iguales arriba / panorámica abajo -->
        <div class="block-b">
          <div class="block-b-top">
            <div class="cell"><img src="sources/frame7.webp" alt="Foto 08"><div class="cell-num">08</div></div>
            <div class="cell"><img src="sources/frame9.webp" alt="Foto 09"><div class="cell-num">09</div></div>
          </div>
          <div class="cell cell-wide">
            <img src="sources/frame11.webp" alt="Foto 10"><div class="cell-num">10</div>
          </div>
        </div>

        <!-- BLOQUE 4 — 2 iguales arriba / 3 iguales abajo -->
        <div class="block-c">
          <div class="block-c-top">
            <div class="cell"><img src="sources/frame10.webp" alt="Foto 11"><div class="cell-num">11</div></div>
            <div class="cell"><img src="sources/frame12.webp" alt="Foto 12"><div class="cell-num">12</div></div>
          </div>
          <div class="block-c-bottom">
            <div class="cell"><img src="sources/frame13.webp" alt="Foto 13"><div class="cell-num">13</div></div>
            <div class="cell"><img src="sources/frame14.webp" alt="Foto 14"><div class="cell-num">14</div></div>
            <div class="cell"><img src="sources/frame15.webp" alt="Foto 15"><div class="cell-num">15</div></div>
          </div>
        </div>

        <!-- BLOQUE 5 — [2 apiladas izq + 1 grande der] -->
        <div class="block-d">
          <div class="block-d-stack">
            <div class="cell"><img src="sources/frame18.webp" alt="Foto 16"><div class="cell-num">16</div></div>
            <div class="cell"><img src="sources/frame17.webp" alt="Foto 17"><div class="cell-num">17</div></div>
          </div>
          <div class="cell"><img src="sources/frame19.webp" alt="Foto 18"><div class="cell-num">18</div></div>
        </div>

      </section>

      <footer class="footer">
        <span>© 2026 Valentina Ferreyra — Santa Fe, Argentina</span>
        <span class="credit">Diseñado por <strong>ZenithLab</strong></span>
      </footer>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="js/animations.js"></script>
</body>
</html>
